spring:
  application:
    name: gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:9000/oauth2/jwks
  cloud:
    loadbalancer:
      enabled: true
    gateway:
      server:
        webflux:
          routes:
            - id: medicos-msv
              uri: lb://medicos-msv
              predicates:
                - Path=/api/medicos/**
              filters:
                - StripPrefix=2
            - id: pacientes-msv
              uri: lb://pacientes-msv
              predicates:
                - Path=/api/pacientes/**
              filters:
                - StripPrefix=2
            - id: citas-msv
              uri: lb://citas-msv
              predicates:
                - Path=/api/citas/**
              filters:
                - StripPrefix=2
server:
  port: 8090
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka